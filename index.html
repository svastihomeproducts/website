<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Black Glossy Background Theme */
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: #f0f0f0; /* Light text */
            position: relative;
        }

        /* Adding the "Glossy" effect overlay */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 50%);
            pointer-events: none;
        }

        /* Top-Center Logo */
        .logo-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .logo-container img {
            width: 400px;
            height: 300px;
            object-fit: contain; /* Prevents stretching */
        }

        /* Centered Coming Soon Text */
        .hero {
            display: flex;
            height: 100%;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 6rem); /* Responsive large font */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Right Bottom Contact Details */
        .contact-info {
            position: absolute;
            bottom: 30px;
            right: 40px;
            text-align: right;
            line-height: 1.6;
            z-index: 10;
        }

        .contact-info p {
            font-size: 1rem;
            color: #cccccc;
        }

        .contact-info a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            display: block;
            transition: color 0.3s ease;
        }

        .contact-info a:hover {
            color: #3498db; /* Subtle highlight color */
        }

        /* Responsive adjustments for mobile */
        @media (max-width: 600px) {
            .logo-container img {
                width: 250px;
                height: auto;
            }
            .contact-info {
                right: 0;
                width: 100%;
                text-align: center;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Company Logo -->
    <div class="logo-container">
        <!-- Replace 'logo.png' with your local filename -->
        <img src="Logo.jpg" alt="Company Logo">
    </div>

    <!-- Centered Text -->
    <main class="hero">
        <div class="container">
            <h1>COMING SOON</h1>
            <p>Our website is under construction. Please check back soon!</p>
        </div>
    
    </main>

    <!-- Bottom Right Contact -->
    <div class="contact-info">
        <p>Get in touch:</p>
        <a href="tel:+919742122312">+91 9742122312</a>
        <a href="mailto:svastigroupsltd@gmail.com">svastigroupsltd@gmail.com</a>
    </div>

</body>
</html>
