<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        /* Base Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh; 
            width: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Glossy overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 50%);
            pointer-events: none;
        }

        /* Header Logo */
        header {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .logo-container img {
            width: 400px;
            height: 300px;
            object-fit: contain;
            max-width: 90vw;
        }

        /* Hero Text with Animations */
        .hero {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;

        }

        .hero h1 {
            font-size: clamp(2.5rem, 12vw, 6rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-align: center;
            
            /* Entry Animation */
            animation: fadeInUp 1.5s ease-out forwards, glow 3s ease-in-out infinite alternate;
            opacity: 0; /* Starts hidden for animation */
        }

        /* Animations Definitions */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(255,255,255,0.1); }
            to { text-shadow: 0 0 30px rgba(255,255,255,0.4), 0 0 10px rgba(52, 152, 219, 0.2); }
        }

        /* Contact Details */
        footer {
            padding: 30px;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .contact-info {
            text-align: right;
            line-height: 1.8;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contact-info p { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .contact-info a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            display: block;
            font-size: 1rem;
            transition: color 0.3s;
        }
        .contact-info a:hover { color: #3498db; }

        /* Mobile Fixes */
        @media (max-width: 768px) {
            .logo-container img { width: 280px; height: 210px; }
            footer { justify-content: center; padding-bottom: 50px; }
            .contact-info { text-align: center; width: 90%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="Logo.jpg" alt="Company Logo">
        </div>
    </header>

    <main class="hero">
        <div class="container">
            <h1>COMING SOON</h1>
            <p>Our website is under construction. Please check back soon!</p>
        </div>
    </main>

    <footer>
        <div class="contact-info">
            <p>Get in touch</p>
            <a href="tel:+919742122312">+91 9742122312</a>
            <a href="mailto:svastigroupsltd@gmail.com">svastigroupsltd@gmail.com</a>
        </div>
    </footer>

</body>
</html>
